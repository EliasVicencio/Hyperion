name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main ] # Cambia a 'master' si tu rama principal se llama así

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Reemplaza 'tu_usuario_hf' y 'tu_nombre_space' con tus datos reales
        run: git push --force https://tu_usuario_hf:$HF_TOKEN@huggingface.co/spaces/eliasvicencio/Hyperion_Core main